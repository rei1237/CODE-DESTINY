<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 운명 꽃 · Code Destiny</title>
  <meta
    name="description"
    content="프로필 자동 연동 + 만세력 오행·자미두수·숙요·점성술·22장 꽃 타로로 완성하는 오늘의 운명 꽃"
  />
  <link rel="stylesheet" href="./destiny-flower.css" />
</head>
<body>
  <main class="pageWrap" id="destinyFlowerApp">
    <section class="heroCard">
      <div class="heroBadge">AUTO PROFILE · 나의 운명 꽃</div>
      <h1>Destiny Flower Atelier 2.0</h1>
      <p>
        프로필 카드에서 생년월일·생시·출생지를 자동 연동하고, 만세력 오행·자미두수·숙요·점성술을 교차해
        22장 꽃 타로로 최종 운명 꽃을 완성합니다.
      </p>
      <div class="progressLine" id="progressLabel">프로필 동기화 중</div>
    </section>

    <section class="profilePanel">
      <div class="panelHeadRow">
        <h2>프로필 자동 연동</h2>
        <button type="button" class="ghostButton" data-action="reload-profile">새로고침</button>
      </div>
      <div id="profileContent"></div>
    </section>

    <section class="resultsSection" id="resultsSection" hidden>
      <h2>4중 교차 분석 결과</h2>
      <div class="resultsGrid" id="resultsGrid"></div>
    </section>

    <section id="tarotMount"></section>
    <section id="finalMount"></section>
  </main>

  <script src="../js/destiny-profile.js" defer></script>
  <script src="./destiny-flower.js" defer></script>
</body>
</html>
