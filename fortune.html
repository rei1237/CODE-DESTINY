  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0720;
      --card-bg: rgba(20, 10, 40, 0.95);
      --border: rgba(255, 183, 178, 0.18);
      --pink: #ff8ba7;
      --gold: #FFD700;
      --text: #e8e0f0;
      --text-dim: rgba(232,224,240,0.6);
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 30% 0%, rgba(120,40,180,0.25) 0%, transparent 55%),
                        radial-gradient(ellipse at 70% 100%, rgba(255,100,150,0.15) 0%, transparent 55%);
      min-height: 100vh;
      font-family: 'Noto Sans KR', 'Gowun Dodum', sans-serif;
      color: var(--text);
      line-height: 1.7;
    }

    /* ── 레이아웃 ── */
    .fe-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ── 상단 GNB ── */
    .fe-gnb {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(13, 7, 32, 0.9);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .fe-gnb a { color: var(--pink); text-decoration: none; font-weight: 700; font-size: .9rem; }
    .fe-gnb-logo { font-size: 1.1rem; font-weight: 900; color: var(--text); }

    /* ── breadcrumb ── */
    .fe-breadcrumb {
      font-size: .78rem;
      color: var(--text-dim);
      padding: 14px 0 8px;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .fe-breadcrumb a { color: var(--pink); text-decoration: none; }
    .fe-breadcrumb a:hover { text-decoration: underline; }
    .fe-breadcrumb span { color: var(--text-dim); }

    /* ── 헤더 ── */
    .fe-header {
      text-align: center;
      padding: 28px 0 20px;
    }
    .fe-entity-emoji {
      font-size: 4.5rem;
      line-height: 1;
      margin-bottom: 12px;
      display: block;
    }
    .fe-title {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
    }
    .fe-subtitle {
      font-size: .85rem;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .fe-total-score {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .fe-stars { font-size: 1.4rem; letter-spacing: 2px; }
    .fe-grade { font-size: .9rem; margin-left: 8px; }

    /* ── 카드 ── */
    .fe-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
    }
    .fe-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--pink);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .fe-card-title::before {
      content: '';
      display: block;
      width: 3px; height: 16px;
      background: var(--pink); border-radius: 2px;
    }
    .fe-card-text { font-size: .92rem; color: var(--text); line-height: 1.75; }
    .fe-card-text--sm { font-size: .84rem; }

    /* ── 점수 바 ── */
    .fe-score-bar {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .fe-score-fill {
      height: 100%;
      border-radius: 4px;
      width: 0;
      transition: width 1.2s ease;
    }

    /* ── 3단 그리드 ── */
    .fe-grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .fe-sub-card { padding: 14px; }
    .fe-sub-card .fe-card-title { font-size: .85rem; margin-bottom: 8px; }
    @media (max-width: 480px) {
      .fe-grid3 { grid-template-columns: 1fr; }
    }

    /* ── 행운 그리드 ── */
    .fe-lucky-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .fe-lucky-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .fe-lucky-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .fe-lucky-label { font-size: .72rem; color: var(--text-dim); margin-bottom: 4px; }
    .fe-lucky-val { font-size: 1.1rem; font-weight: 900; color: var(--gold); }

    /* ── 조언 ── */
    .fe-advice {
      font-family: 'Gowun Dodum', serif;
      font-size: 1rem;
      color: var(--gold);
      line-height: 1.8;
      border-left: 3px solid var(--gold);
      padding-left: 16px;
    }

    /* ── 내부 링크 칩 ── */
    .fe-links { margin-bottom: 14px; }
    .fe-links-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .fe-link-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .fe-link-chip {
      display: inline-block;
      padding: 7px 14px;
      background: rgba(255,139,167,0.1);
      border: 1px solid rgba(255,139,167,0.25);
      border-radius: 50px;
      color: var(--pink);
      font-size: .8rem;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s;
      white-space: nowrap;
    }
    .fe-link-chip:hover {
      background: rgba(255,139,167,0.22);
    }
    .fe-link-chip--period {
      background: rgba(255,215,0,0.1);
      border-color: rgba(255,215,0,0.3);
      color: var(--gold);
    }
    .fe-link-chip--period:hover { background: rgba(255,215,0,0.2); }

    /* ── CTA ── */
    .fe-cta {
      background: linear-gradient(135deg, rgba(120,40,180,0.3), rgba(255,100,150,0.15));
      border: 1px solid rgba(255,139,167,0.3);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 14px;
    }
    .fe-cta-title {
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 16px;
    }
    .fe-cta-btns {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    }
    .fe-cta-btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: .9rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      transition: background .2s;
    }
    .fe-cta-btn:hover { background: rgba(255,255,255,0.15); }
    .fe-cta-btn--main {
      background: linear-gradient(135deg, #ff8ba7, #e879f9);
      border: none;
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,139,167,0.35);
    }

    /* ── 광고 영역 ── */
    .fe-ad {
      margin: 20px 0;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      text-align: center;
    }
    .fe-ad-label {
      font-size: .72rem;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* ── 색인 페이지 그리드 ── */
    .fe-index-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .fe-index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: border-color .2s, background .2s;
      display: block;
    }
    .fe-index-card:hover {
      border-color: var(--pink);
      background: rgba(255,139,167,0.08);
    }
    .fe-index-card-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
    .fe-index-card-name  { font-size: .88rem; font-weight: 700; }
    .fe-index-card-sub   { font-size: .72rem; color: var(--text-dim); margin-top: 2px; }

    /* ── 로딩 ── */
    #feLoading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: 12px;
    }
    .fe-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,139,167,0.2);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: feSpin .8s linear infinite;
    }
    @keyframes feSpin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="fe-gnb" role="navigation" aria-label="사이트 탐색">

<!-- fortune-engine 로드 -->
<script src="/js/fortune-engine.js"></script>

<!-- 광고 안전 헬퍼 (main index.html과 동일) -->
<script>
window._safePushAd = window._safePushAd || function(sc) {
  var ins = sc && sc.previousElementSibling;
  if (!ins || ins.tagName !== 'INS') { try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){} return; }
  var pushed = false;
  function doPush(){ if(pushed)return; pushed=true; try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){} }
  if(typeof IntersectionObserver!=='undefined'){
    var io=new IntersectionObserver(function(es,o){if(es[0].intersectionRatio>0){o.disconnect();doPush();}},{threshold:0.01});
    io.observe(ins);
  } else { setTimeout(doPush,300); }
};

/* ── 페이지 라우팅 ──
   URL 패턴: /fortune/{period}/{id}.html
   window.FORTUNE_CONFIG 가 있으면 그것 사용 (스텁 페이지에서 주입) */
(function() {
  var cfg = window.FORTUNE_CONFIG;
  if (!cfg) {
    /* URL에서 파싱 */
    var path = window.location.pathname; /* /fortune/today/rat.html */
    var parts = path.replace(/^\/fortune\//, '').replace(/\.html$/, '').split('/');
    var periodId = parts[0] || 'today';
    var entityId = parts[1] || '';
    /* 유형 결정 */
    var signIds = ['aries','taurus','gemini','cancer','leo','virgo','libra','scorpio','sagittarius','capricorn','aquarius','pisces'];
    var type = signIds.indexOf(entityId) >= 0 ? 'sign' : 'animal';
    cfg = { type: type, id: entityId, period: periodId };
  }

  if (!cfg.id) {
    /* 색인 페이지 렌더링 */
    renderIndex();
  } else {
    if (typeof FortuneEngine !== 'undefined') {
      FortuneEngine.initFromConfig(cfg);
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        FortuneEngine.initFromConfig(cfg);
      });
    }
  }

  function renderIndex() {
    var animals = (typeof FortuneEngine !== 'undefined') ? FortuneEngine.ANIMALS : [];
    var signs   = (typeof FortuneEngine !== 'undefined') ? FortuneEngine.SIGNS   : [];

    var animalCards = animals.map(function(a) {
      return '<a class="fe-index-card" href="/fortune/today/' + a.id + '.html">' +
             '<span class="fe-index-card-emoji">' + a.emoji + '</span>' +
             '<div class="fe-index-card-name">' + a.ko + '</div>' +
             '<div class="fe-index-card-sub">' + a.earthly + ' · ' + a.element + '행</div>' +
             '</a>';
    }).join('');

    var signCards = signs.map(function(s) {
      return '<a class="fe-index-card" href="/fortune/today/' + s.id + '.html">' +
             '<span class="fe-index-card-emoji">' + s.emoji + '</span>' +
             '<div class="fe-index-card-name">' + s.ko + '</div>' +
             '<div class="fe-index-card-sub">' + s.period + '</div>' +
             '</a>';
    }).join('');

    var html = [
      '<nav class="fe-breadcrumb"><a href="/">🏠 홈</a><span>›</span><span>운세</span></nav>',
      '<h1 style="font-size:1.6rem;font-weight:900;color:#fff;text-align:center;padding:20px 0 8px">🔮 오늘의 운세</h1>',
      '<p style="text-align:center;color:var(--text-dim);font-size:.88rem;margin-bottom:24px">12띠 · 별자리별 총운·연애운·재물운·건강운</p>',
      '<h2 style="font-size:1rem;font-weight:700;color:var(--pink);margin-bottom:12px">🐭 12띠 운세</h2>',
      '<div class="fe-index-grid">' + animalCards + '</div>',
      '<h2 style="font-size:1rem;font-weight:700;color:var(--pink);margin:28px 0 12px">⭐ 별자리 운세</h2>',
      '<div class="fe-index-grid">' + signCards + '</div>',
      '<section class="fe-cta" style="margin-top:28px">',
      '  <h2 class="fe-cta-title">🔮 더 깊은 사주 분석</h2>',
      '  <div class="fe-cta-btns">',
      '    <a class="fe-cta-btn fe-cta-btn--main" href="/">🐷 무료 사주팔자 분석</a>',
      '  </div>',
      '</section>'
    ].join('\n');

    var app = document.getElementById('fortuneApp');
    if (app) app.innerHTML = html;
  }
})();
</script>
